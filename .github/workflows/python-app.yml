# CI — PriceWatch
# Validates both the Python/Flask backend and the Vue 3 SPA frontend.
# Backend: flake8 lint + pytest (SCHEDULER_ENABLED=false)
# Frontend: TypeScript check + Vitest tests + Vite production build

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # ── Python / Flask backend ────────────────────────────────────────────────
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Python tests
      run: |
        SCHEDULER_ENABLED=false pytest
      env:
        SCHEDULER_ENABLED: "false"

    # ── Vue 3 SPA frontend ────────────────────────────────────────────────────
    # Single entry: src/main.ts → static/dist/ via Vite 5.
    # manifest.json key: "src/main.ts" (consumed by pricewatch/web/assets.py).
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Frontend typecheck
      working-directory: frontend
      run: npm run typecheck

    - name: Frontend tests
      working-directory: frontend
      run: npm test

    - name: Frontend production build
      working-directory: frontend
      run: npm run build
